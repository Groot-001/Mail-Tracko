# ## Brand & Style
# The brand personality is **authoritative, professional, and high-performance**. It targets enterprise-level power users who require high information density without sacrificing visual clarity.

# The design style is **Corporate Modern with a Dark Fidelity twist**. It utilizes a sophisticated "Muted Gold" primary palette against a clean, neutral foundation to create a premium, "Executive Suite" feel. The interface relies on a structured hierarchy, subtle tonal layering, and precise interactive states to convey reliability and enterprise-grade power.

# ## Colors
# The color system follows a **Fidelity Light** model, transitioning from a warm-grey base to a more neutral, high-clarity foundation.
# - **Backgrounds:** The system uses a clean, neutral palette derived from a light-grey seed (`#ededed`). This provides a more balanced and modern feel that remains crisp and professional.
# - **Primary:** A refined, brighter Gold (`#edd03f`) is used for calls to action, active navigation states, and critical branding elements.
# - **Secondary:** A professional, deeper olive-toned Tan (`#9b8c51`) provides a grounded secondary layer for supporting UI elements, offering better contrast and a more serious tone.
# - **Semantic Accents:** Tertiary Soft Blue (`#7db6c8`) is reserved for security and secondary features (like 2FA), ensuring informational clarity without visual noise.
# - **Contrast:** High legibility is maintained through calibrated `on-surface` and `on-surface-variant` tokens that ensure text remains crisp against the neutral surfaces.

# ## Typography
# The system uses **Inter** exclusively to emphasize its functional, SaaS-oriented nature.
# - **Hierarchy:** Tight letter-spacing on headlines creates a compact, premium feel.
# - **Utility:** `label-caps` is used for overlines and section categorization to provide clear structure without visual weight.
# - **Emphasis:** Bold weights are used for the "Enterprise Tier" branding and primary navigation items, while Medium (500) is used for interactive labels to differentiate them from standard body text.

# ## Layout & Spacing
# The layout follows a **Fixed Sidebar + Fluid Content** model.
# - **Sidebar:** A constant 280px left-hand navigation allows for deep information architecture and branding.
# - **Canvas:** The main content is capped at 1440px for readability, centered with large gutters (24px).
# - **Vertical Rhythm:** Sections are separated by `stack-lg` (32px), while internal card elements use `stack-md` (16px) or `stack-sm` (8px) for tight logical grouping.
# - **Responsive:** On mobile, the sidebar transitions to a hidden/drawer state, and horizontal margins shrink to 16px.

# ## Elevation & Depth
# Depth is created through **Tonal Layering** rather than traditional shadows, utilizing refined neutral-grey tones.
# - **Base Level:** `background` serves as the floor.
# - **Navigation/Cards:** Surfaces use `surface-container-lowest` to feel recessed or `surface-container` to feel elevated.
# - **Interactive Depth:** Hover states utilize `surface-container-highest` or subtle `outline-variant` borders to indicate interactivity.
# - **Top AppBar:** Uses a `backdrop-blur` (80% opacity) to provide a sense of transparency and place when scrolling content underneath.

# ## Shapes
# The shape language is **Soft (0.25rem - 0.75rem)**.
# - **Small Components:** Inputs and buttons use a default `0.5rem` (rounded-lg) for a modern, approachable feel.
# - **Containers:** Large cards and section blocks use `0.75rem` (rounded-xl).
# - **Special Elements:** Search bars and "Inbox Count" badges use full-pill rounding (9999px) to distinguish them as utility or notification elements.
# - **Iconography:** Square icons use 8px rounding to match the button geometry.

# ## Components
# - **Buttons:** Primary buttons are high-contrast Gold with dark text. Secondary buttons utilize the muted Tan palette or are outlined with `outline-variant`.
# - **Inputs:** Use `surface-container-low` with a 50% opacity border. Focus states trigger a 2px `primary` ring.
# - **Side Nav:** Active items use a container-fill (`primary-container`) with bold text. Inactive items use `on-surface-variant` with a 150ms transition to primary gold on hover.
# - **Cards:** Defined by a 1px border (`outline-variant/30`) and a transition effect that brightens the border color when hovered.
# - **Toggles:** Use a standard pill track. The "On" state uses the `primary` color for the track, while the thumb remains white for maximum contrast.
